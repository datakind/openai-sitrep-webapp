steps:
  # Step 1 - Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/executive-summary:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/executive-summary:latest'
      - '.'

  # Step 2 - Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/executive-summary:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/executive-summary:latest'

  # Step 3 - Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'executive-summary'
      - '--image'
      - 'gcr.io/$PROJECT_ID/executive-summary:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '512Mi'
      - '--set-secrets'
      - 'OPENAI_API_KEY=OPENAI_API_KEY:latest,OPENAI_MODEL=OPENAI_MODEL:latest'

images:
  - 'gcr.io/$PROJECT_ID/executive-summary:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/executive-summary:latest'